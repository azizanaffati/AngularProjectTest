<div class="container mt-4" *ngIf="res">
    <div class="card" style="width: 18rem;" >
        <div class="card-body">
          <h5 class="card-title">{{res.name}}</h5>
          <p>
            {{res. address}}
          </p>
          <p>
            {{res.status}}
          </p>
          <p class="card-text">{{res.created_at }}</p>
          <p class="card-text">{{res.updated_at }}</p>
        </div>

  </div>
